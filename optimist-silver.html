    <style>
        :root {
            --singapore-red: #9D0A0E;
            --table-header-bg: #9D0A0E;
            --table-header-hover: #7D080B;
        }
        body { font-family: 'Roboto', sans-serif; margin: 20px; background-color: #f5f5f5; color: #333; }
        .container { max-width: 95%; margin: 0 auto; background-color: white; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 5px; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo { max-width: 300px; height: auto; }
        h1 { font-family: 'Roboto', 'Arial Black', sans-serif; text-transform: uppercase; font-weight: 700; color: var(--singapore-red); text-align: center; margin-bottom: 20px; letter-spacing: 1px; }
        .ranking-table { width: 100%; border-collapse: collapse; margin-top: 20px; color: #333; table-layout: fixed; }
        .ranking-table th, .ranking-table td { border: 1px solid #ddd; padding: 8px; text-align: center; overflow: visible; white-space: normal; word-wrap: break-word; width: 100px; min-width: 100px; }
        .ranking-table th { background-color: var(--table-header-bg); color: white !important; cursor: pointer; position: sticky; top: 0; text-transform: uppercase; font-family: 'Roboto', 'Arial Black', sans-serif; font-weight: 600; letter-spacing: 0.5px; z-index: 10; height: auto; vertical-align: middle; box-shadow: 0 2px 2px -1px rgba(0, 0, 0, 0.4); }
        .ranking-table th:hover { background-color: var(--table-header-hover); }
        .ranking-table tr:nth-child(even) { background-color: #f2f2f2; }
        .ranking-table tr:hover { background-color: #ddd; }
        .sorted-asc::after { content: " ▲"; }
        .sorted-desc::after { content: " ▼"; }

        #toggle-controls-btn {
            display: block; /* Default to block. If issues, try display: block !important; */
            width: auto; margin: 10px auto 20px auto; padding: 10px 20px;
            background-color: var(--singapore-red); color: white; border: none;
            border-radius: 5px; cursor: pointer; font-family: 'Roboto', 'Arial Black', sans-serif;
            text-transform: uppercase; font-weight: 500; letter-spacing: 0.5px;
            font-size: 1em; z-index: 100;
        }
        #toggle-controls-btn:hover { background-color: var(--table-header-hover); }

        #controls-area {
            display: none; /* Hidden by default */
            margin-bottom: 20px; padding: 15px; background-color: #f8f8f8;
            border-radius: 5px; border: 1px solid #ddd;
        }
        #controls-area.visible {
            display: block; /* To show the area. If issues, try display: block !important; */
        }

        #controls-area .search-container, #controls-area .filter-container { margin-bottom: 15px; }
        #controls-area #sailor-search, #controls-area .filter-select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; box-sizing: border-box; margin-bottom: 10px; }
        #controls-area .column-visibility-controls { margin-bottom: 15px; padding: 10px; background-color: #fff; border: 1px solid #ddd; border-radius: 5px; }
        #controls-area .column-checkbox-container { display: flex; flex-wrap: wrap; gap: 10px; }
        #controls-area .column-checkbox-label { display: flex; align-items: center; gap: 5px; padding: 5px; background-color: #f0f0f0; border-radius: 3px; cursor: pointer; }
        #controls-area .button-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        #controls-area .button-container button { background-color: var(--singapore-red); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-family: 'Roboto', 'Arial Black', sans-serif; text-transform: uppercase; font-weight: 500; letter-spacing: 0.5px; }
        #controls-area .button-container button:hover { background-color: var(--table-header-hover); }
        #controls-area .button-container .secondary-button { background-color: #6c757d; }
        #controls-area .button-container .secondary-button:hover { background-color: #5a6268; }
        .footer { margin-top: 30px; text-align: center; font-size: 14px; color: #777; padding-top: 20px; border-top: 1px solid #ddd; }
        #hidden-logo { display: none; }
        .table-responsive { overflow-x: auto; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; margin-bottom: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-height: 900px; }
        @media (max-width: 768px) {
            .container { padding: 10px; }
            #controls-area { padding: 10px; }
            #controls-area .button-container { flex-direction: column; }
            #controls-area .button-container button { width: 100%; }
            #toggle-controls-btn { width: 90%; font-size: 0.9em; }
        }
    </style>
</head>

rts Centre", "63", "54", "66", "50", "54", "158"], ["56", "1210", "Mak, Efrem", "M", "SAF Yacht Club", "67", "56", "63", "59", "50", "165"], ["57", "1409", "-", "-", "-", "68", "67", "49", "62", "58", "169"], ["58", "1490", "Wong, Mikayla Zi Yue", "M", "Changi Sailing Club", "65", "51", "67", "62", "58", "171"], ["59", "1811", "Hon, Joshua", "M", "Others", "68", "52", "67", "62", "58", "172"], ["60", "488", "Tan, Christopher", "M", "Constant Wind SeaSports @ NSRCC Sea Sports Centre", "60", "60", "59", "55", "58", "172"], ["61", "1133", "Teng, Ian Shao Feng", "M", "Changi Sailing Club", "68", "67", "67", "62", "45", "174"], ["62", "1307", "Leow, Adam", "M", "Constant Wind SeaSports @ NSRCC Sea Sports Centre", "68", "67", "67", "57", "51", "175"], ["63", "95", "Tan, You Yu", "M", "PAssion Wave (Pasir Ris)", "55", "66", "67", "62", "58", "175"], ["64", "1451", "Du, Xiang Yu", "M", "SAF Yacht Club", "68", "67", "67", "62", "47", "176"], ["65", "592", "Chiam, Isaac Qin Ran", "M", "SAF Yacht Club", "68", "65", "67", "58", "55", "178"], ["66", "905", "Soh, Ryan Jonathan Zhi Jie", "M", "SAF Yacht Club", "66", "63", "64", "60", "56", "179"], ["67", "585", "Tan, Jonathan Zi Kang", "M", "PAssion Wave (East Coast)", "68", "64", "67", "62", "58", "184"], ["68", "1244", "Wu, Youxun", "M", "SAF Yacht Club", "68", "67", "67", "62", "57", "186"], ["69", "2096", "Ng, Tobias", "M", "SAF Yacht Club", "68", "67", "67", "61", "58", "186"]]};
        const originalTableData = JSON.parse(JSON.stringify(tableData)); // Deep copy
        let sortColumn = 0; // Default sort column index
        let sortDirection = 1; // 1 for ascending, -1 for descending
        const columnVisibility = {};

        // Initialize columnVisibility: all columns initially visible
        if (tableData && tableData.columns) {
            tableData.columns.forEach(column => { columnVisibility[column] = true; });
        } else {
            console.error("CRITICAL ERROR: tableData.columns is undefined. Table functionality will be impaired.");
        }

        function initializeTable() {
            if (!tableData || !tableData.columns) {
                console.error("ERROR in initializeTable: tableData or tableData.columns is not defined. Aborting table initialization.");
                return;
            }
            createColumnCheckboxes();
            const nationalRankIndex = tableData.columns.indexOf('National Rank');
            if (nationalRankIndex !== -1) {
                sortColumn = nationalRankIndex; // Default sort by National Rank if it exists
                sortDirection = 1; // Ascending
            }
            updateTableHeader();
            populateTableRows();
            populateFilterDropdowns();
        }

        function createColumnCheckboxes() {
            const container = document.getElementById('column-checkboxes');
            if (!container) { console.error("ERROR: 'column-checkboxes' container not found."); return; }
            container.innerHTML = ''; // Clear existing checkboxes
            if (!tableData || !tableData.columns) { console.error("ERROR in createColumnCheckboxes: tableData.columns is undefined."); return; }

            tableData.columns.forEach((column, index) => {
                const label = document.createElement('label');
                label.className = 'column-checkbox-label';
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = columnVisibility[column]; // Reflect current visibility state
                checkbox.onchange = () => {
                    columnVisibility[column] = checkbox.checked;
                    updateTableHeader(); // Re-render header
                    populateTableRows(); // Re-render rows
                };
                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(column));
                container.appendChild(label);
            });
        }

        function updateTableHeader() {
            const headerRow = document.querySelector('#ranking-table thead tr');
            if (!headerRow) { console.error("ERROR: '#ranking-table thead tr' not found."); return; }
            headerRow.innerHTML = ''; // Clear existing header
            if (!tableData || !tableData.columns) { console.error("ERROR in updateTableHeader: tableData.columns is undefined."); return; }

            tableData.columns.forEach((column, index) => {
                if (columnVisibility[column]) { // Only add header if column is visible
                    const th = document.createElement('th');
                    th.textContent = column;
                    th.onclick = () => sortTable(index);
                    th.setAttribute('data-column', index);
                    th.classList.remove('sorted-asc', 'sorted-desc'); // Clear old sort indicators
                    if (index === sortColumn) { // Add indicator if this is the current sort column
                        th.classList.add(sortDirection === 1 ? 'sorted-asc' : 'sorted-desc');
                    }
                    headerRow.appendChild(th);
                }
            });
        }

        function populateTableRows() {
            const tbody = document.querySelector('#ranking-table tbody');
            if (!tbody) { console.error("ERROR: '#ranking-table tbody' not found."); return; }
            tbody.innerHTML = ''; // Clear existing rows

            const searchInput = document.getElementById('sailor-search');
            const clubSelect = document.getElementById('club-filter');
            const genderSelect = document.getElementById('gender-filter');

            if (!searchInput || !clubSelect || !genderSelect) {
                 console.error("ERROR: One or more filter/search input DOM elements not found."); return;
            }

            const searchTerm = searchInput.value.toLowerCase();
            const clubFilter = clubSelect.value;
            const genderFilter = genderSelect.value;

            if (!tableData || !tableData.columns || !tableData.rows) {
                console.error("ERROR in populateTableRows: tableData, tableData.columns, or tableData.rows is undefined."); return;
            }
            const clubIndex = tableData.columns.indexOf('Club');
            const genderIndex = tableData.columns.indexOf('Gender');

            let currentRows = tableData.rows; // Assumes tableData.rows is already sorted by sortTable()
            currentRows.forEach((row) => {
                // Apply filters
                let passesFilters = true;
                if (clubFilter && clubIndex >= 0 && row[clubIndex] !== clubFilter) passesFilters = false;
                if (genderFilter && genderIndex >= 0 && row[genderIndex] !== genderFilter) passesFilters = false;
                if (!passesFilters) return; // Skip row if it doesn't pass filters

                // Apply search term
                if (searchTerm) {
                    let foundInSearch = false;
                    for (let i = 0; i < row.length; i++) {
                        // Search only in columns that are currently set to be visible
                        if (columnVisibility[tableData.columns[i]] && String(row[i]).toLowerCase().includes(searchTerm)) {
                            foundInSearch = true; break;
                        }
                    }
                    if (!foundInSearch) return; // Skip row if search term not found
                }

                const tr = document.createElement('tr');
                row.forEach((cell, cellIndex) => {
                    if (columnVisibility[tableData.columns[cellIndex]]) { // Only add cell if column is visible
                        const td = document.createElement('td');
                        td.textContent = cell;
                        tr.appendChild(td);
                    }
                });
                tbody.appendChild(tr);
            });
        }

        function populateFilterDropdowns() {
            if (!tableData || !tableData.columns || !originalTableData || !originalTableData.rows) {
                console.error("ERROR in populateFilterDropdowns: Required data objects (tableData, originalTableData) are not fully defined."); return;
            }

            const clubIndex = tableData.columns.indexOf('Club');
            const clubFilterEl = document.getElementById('club-filter');
            if (clubIndex >= 0 && clubFilterEl) {
                const clubs = [...new Set(originalTableData.rows.map(row => row[clubIndex]))].filter(c => c).sort(); // Get unique, non-empty, sorted clubs
                clubFilterEl.innerHTML = '<option value="">All Clubs</option>'; // Reset
                clubs.forEach(club => { const option = document.createElement('option'); option.value = club; option.textContent = club; clubFilterEl.appendChild(option); });
            }

            const genderIndex = tableData.columns.indexOf('Gender');
            const genderFilterEl = document.getElementById('gender-filter');
            if (genderIndex >= 0 && genderFilterEl) {
                const genders = [...new Set(originalTableData.rows.map(row => row[genderIndex]))].filter(g => g).sort();
                genderFilterEl.innerHTML = '<option value="">All Genders</option>';
                genders.forEach(gender => { const option = document.createElement('option'); option.value = gender; option.textContent = gender; genderFilterEl.appendChild(option); });
            }
        }

        function applyFilters() { populateTableRows(); }
        function searchTable() { populateTableRows(); }

        function sortTable(columnIndex) {
            if (!tableData || !tableData.rows) { console.error("ERROR in sortTable: tableData.rows is undefined."); return; }

            if (sortColumn === columnIndex) {
                sortDirection *= -1; // Toggle direction
            } else {
                sortColumn = columnIndex;
                sortDirection = 1; // Default to ascending for new column
            }

            tableData.rows.sort((a, b) => {
                let valA = a[columnIndex];
                let valB = b[columnIndex];

                // Handle empty strings consistently: push them to the bottom regardless of sort order
                const isAEmpty = valA === null || valA === undefined || valA === "";
                const isBEmpty = valB === null || valB === undefined || valB === "";

                if (isAEmpty && isBEmpty) return 0;
                if (isAEmpty) return 1; // valA is empty, valB is not, so A comes after B
                if (isBEmpty) return -1; // valB is empty, valA is not, so B comes after A

                // Attempt numeric sort if both are numbers
                const numA = parseFloat(valA);
                const numB = parseFloat(valB);
                if (!isNaN(numA) && !isNaN(numB)) {
                    return sortDirection * (numA - numB);
                }

                // Fallback to string locale-aware comparison (with numeric option)
                return sortDirection * String(valA).localeCompare(String(valB), undefined, { numeric: true, sensitivity: 'base' });
            });
            updateTableHeader();
            populateTableRows();
        }

        function resetTable() {
            const searchInput = document.getElementById('sailor-search');
            const clubSelect = document.getElementById('club-filter');
            const genderSelect = document.getElementById('gender-filter');
            // Reset input fields
            if (searchInput) searchInput.value = '';
            if (clubSelect) clubSelect.value = '';
            if (genderSelect) genderSelect.value = '';

            if (!tableData || !tableData.columns || !originalTableData || !originalTableData.rows) {
                console.error("ERROR in resetTable: tableData or originalTableData parts are not fully defined."); return;
            }
            // Reset column visibility to all true
            Object.keys(columnVisibility).forEach(column => { columnVisibility[column] = true; });
            // Restore original row data (deep copy)
            tableData.rows = JSON.parse(JSON.stringify(originalTableData.rows));

            // Reset sort to default (e.g., National Rank, ascending)
            const nationalRankIndex = tableData.columns.indexOf('National Rank');
            if (nationalRankIndex !== -1) {
                sortColumn = nationalRankIndex;
                sortDirection = 1;
            } else {
                sortColumn = 0; // Fallback to first column
                sortDirection = 1;
            }

            // Re-render everything
            createColumnCheckboxes();
            updateTableHeader();
            populateTableRows();
        }

        function getFilteredAndSortedRows() {
            if (!tableData || !tableData.columns || !tableData.rows) {
                console.error("ERROR in getFilteredAndSortedRows: tableData parts are not fully defined."); return [];
            }
            const searchInput = document.getElementById('sailor-search');
            const clubSelect = document.getElementById('club-filter');
            const genderSelect = document.getElementById('gender-filter');
            if (!searchInput || !clubSelect || !genderSelect) {
                 console.error("ERROR: One or more filter/search input DOM elements not found for export data generation."); return [];
            }
            const searchTerm = searchInput.value.toLowerCase();
            const clubFilter = clubSelect.value;
            const genderFilter = genderSelect.value;
            const clubIndex = tableData.columns.indexOf('Club');
            const genderIndex = tableData.columns.indexOf('Gender');

            // Use the current, sorted tableData.rows as the base for filtering
            let filteredRows = tableData.rows.filter(row => {
                if (clubFilter && clubIndex >= 0 && row[clubIndex] !== clubFilter) return false;
                if (genderFilter && genderIndex >= 0 && row[genderIndex] !== genderFilter) return false;
                if (searchTerm) {
                    let found = false;
                    for (let i = 0; i < row.length; i++) {
                        if (columnVisibility[tableData.columns[i]] && String(row[i]).toLowerCase().includes(searchTerm)) {
                            found = true; break;
                        }
                    }
                    if (!found) return false;
                }
                return true;
            });
            return filteredRows;
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf; // Ensure jsPDF is correctly accessed from window object
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.setProperties({ title: 'Singapore Sailing National Ranking (Admin)', subject: 'National Ranking Table', author: 'Singapore Sailing Federation', creator: 'National Ranking Tool' });
            const logoImg = document.getElementById('hidden-logo');
            if (logoImg && logoImg.src && logoImg.src.indexOf('base64') !== -1) {
                try {
                    doc.addImage(logoImg.src, 'PNG', 240, 10, 40, 15);
                } catch (e) {
                    console.error("Error adding logo to PDF:", e);
                }
            }
            doc.setFontSize(16); doc.setTextColor(157, 10, 14); doc.text('OPTIMIST SILVER FLEET NATIONAL RANKING', 15, 20); // Updated Title
            doc.setFontSize(10); doc.setTextColor(0, 0, 0); const today = new Date().toLocaleDateString(); doc.text(`Generated on: ${today}`, 15, 25);

            if (!tableData || !tableData.columns) { console.error("ERROR in exportToPDF: tableData.columns undefined."); return; }
            const visibleColumnsHeaders = tableData.columns.filter(column => columnVisibility[column]);
            const rowsForExport = getFilteredAndSortedRows();
            const bodyData = rowsForExport.map(row =>
                row.filter((cell, index) => columnVisibility[tableData.columns[index]])
            );

            doc.autoTable({
                head: [visibleColumnsHeaders],
                body: bodyData,
                startY: 30,
                theme: 'grid',
                headStyles: { fillColor: [157, 10, 14], textColor: [255, 255, 255], fontStyle: 'bold', halign: 'center', cellPadding: 2, minCellHeight: 14, valign: 'middle' },
                alternateRowStyles: { fillColor: [240, 240, 240] },
                margin: { top: 30 },
                styles: { overflow: 'linebreak', cellPadding: 3, fontSize: 8, halign: 'center' }
            });
            const pageCount = doc.internal.getNumberOfPages();
            for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                doc.setFontSize(8);
                doc.text(`Singapore Sailing Federation | Page ${i} of ${pageCount}`, doc.internal.pageSize.width - 90, doc.internal.pageSize.height - 10);
            }
            doc.save('ssf_silverfleet_ranking.pdf'); // Updated PDF filename
        }

        function exportToExcel() {
            if (!tableData || !tableData.columns) { console.error("ERROR in exportToExcel: tableData.columns undefined."); return; }
            const visibleColumnsHeaders = tableData.columns.filter(column => columnVisibility[column]);
            const rowsForExport = getFilteredAndSortedRows();
            const bodyData = rowsForExport.map(row =>
                row.filter((cell, index) => columnVisibility[tableData.columns[index]])
            );
            const ws = XLSX.utils.aoa_to_sheet([visibleColumnsHeaders, ...bodyData]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'National Ranking');
            XLSX.writeFile(wb, 'ssf_silverfleet_ranking.xlsx'); // Updated Excel filename
        }

        // Initialize the main table logic after the DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            initializeTable();
        });
        // --- End Main Table Logic ---
    </script>
